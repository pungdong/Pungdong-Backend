spring:
  jwt:
    secret: test-only-secret-not-for-production-do-not-rotate
  datasource:
    username: sa
    password:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    hikari:
      jdbc-url: jdbc:h2:mem:testdb
  # 테스트는 Flyway(MySQL SQL) 안 씀 — H2 라 dialect 불일치. 엔티티에서 스키마 생성(create-drop)으로 격리.
  flyway:
    enabled: false
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl.auto: create-drop   # 운영 validate 를 H2 에서 override — 매 테스트 엔티티로 스키마 새로 생성
  redis:
    host: localhost
    # docker Redis(6379)와 분리된 테스트 전용 포트 — EmbeddedRedisConfig.TEST_REDIS_PORT 와 일치.
    # (테스트가 dev 의 docker Redis 를 오염시키지 않게.)
    port: 16379

AdminMail:
  id: test@example.invalid
  password: test-only-password

# 테스트는 항상 StubTossPaymentClient — 외부 PG 에 의존 금지(hermetic, e2e 아님). direnv 의 PAYMENT_MODE=toss 가
# test JVM 으로 새어 RealTossPaymentClient 가 켜지면 RefundUseCaseTest 등이 실제 Toss API 를 때려 실패하던 걸 차단.
# profile-specific 이라 application.yml 의 ${PAYMENT_MODE:stub} 해석값을 이긴다. 앱 런타임(dev/staging/prod)엔 무영향.
pungdong:
  payment:
    mode: stub
  # 본인확인은 테스트 기본 stub(매직 OTP "000000"=성공). CI/DI 암호화 키는 결정적 테스트 값으로 핀
  # (미설정이면 dev 폴백 키 + WARN — 동작엔 무해하나 노이즈 제거용).
  identity-verification:
    crypto-key: test-only-identity-crypto-key-not-for-production
    send-cooldown-seconds: 0   # 기본 비활성 — 기존 테스트가 create→resend 를 즉시 호출. 쿨다운은 전용 테스트에서 켠다.

cors:
  allowed-origins: http://localhost:3000