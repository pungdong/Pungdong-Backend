server:
  port: 8080

spring:
  application:
    name: msa-legacy-service
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        jdbc.lob.non_contextual_creation: true
        hbm2ddl.auto: update
        format_sql: true
    show-sql: true

  messages:
    basename: i18n/exception
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  jwt.secret: ${JWT_SECRET}

logging:
  level:
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
    com:
      amazonaws:
        util:
          EC2MetadataUtils: error



cloud.aws.s3.bucket: pungdong
cloud.aws.region.static: ap-northeast-2
cloud.aws.stack.auto: false

spring.servlet.multipart.max-file-size: 50MB
spring.servlet.multipart.max-request-size: 50MB

mail:
  smtp:
    auth: true
    port: 465
    starttls:
      required: true
      enable: true
    socketFactory:
      class: javax.net.ssl.SSLSocketFactory
      fallback: false
      port: 465

AdminMail:
  id: ${ADMIN_MAIL_ID}
  password: ${ADMIN_MAIL_PASSWORD}

# CORS 허용 origin — 콤마 구분. 로컬 dev 기본값 (Vite/Next dev 서버). prod 는 env 로 override.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# 외부 연동 경계 (강사 신청). dev 기본값 = stub/local. prod 는 filesystem config / env 로 override:
#   pungdong.storage.s3.enabled=true            (S3 실연동 — Phase 4 버킷 provision 후)
#   pungdong.identity-verification.mode=disabled (실 본인확인기관 연동 전까지 fail-closed)
pungdong:
  storage:
    s3:
      enabled: ${STORAGE_S3_ENABLED:false}
    local:
      dir: ${STORAGE_LOCAL_DIR:local-uploads}
      base-url: ${STORAGE_LOCAL_BASE_URL:http://localhost:8080}
  identity-verification:
    mode: ${IDENTITY_VERIFICATION_MODE:stub}   # stub | disabled (| real — 미구현)
  # 어드민 지정 allowlist (콤마구분). 부팅 시 해당 이메일 계정에 ROLE_ADMIN 부여(idempotent).
  # 권한은 DB role 이 출처 — 이 목록은 "누구를 admin 으로"만 정함. 가입 후 재기동 시 반영.
  admin:
    emails: ${ADMIN_EMAILS:}
  # 약관 콘텐츠 소스 (Sanity). 동의 기록 시 BE 가 (key,version) 으로 전문을 직접 받아 박제한다.
  # public dataset 읽기라 토큰 불필요. projectId 는 공개값 — FE 와 동일.
  sanity:
    project-id: ${SANITY_PROJECT_ID:rc448mwo}
    dataset: ${SANITY_DATASET:production}
    api-version: ${SANITY_API_VERSION:2024-01-01}
  # 주소 검색 + 좌표 변환 (juso). 좌표제공 API 는 개발용 승인키가 없어 로컬은 stub 기본.
  # staging/prod 만 juso 실호출: ADDRESS_GEOCODE_MODE=juso + 키 2개(검색/좌표) + 등록 URL referer.
  address:
    geocode-mode: ${ADDRESS_GEOCODE_MODE:stub}   # stub | juso
    juso:
      search-key: ${JUSO_SEARCH_KEY:}             # 도로명주소 검색 승인키
      coord-key: ${JUSO_COORD_KEY:}               # 좌표제공 승인키 (검색 키와 별개)
      referer: ${JUSO_REFERER:}                   # 운영 키 등록 URL (서버 호출 referer)
      # source-crs: 좌표제공 entX/entY 의 좌표계(기본 EPSG:5179). 실응답 검증 후 필요 시 override.
  # 결제(토스페이먼츠 결제위젯 v2). 로컬은 stub 기본(토스 미호출, 즉시 DONE).
  # staging/prod 만 실연동: PAYMENT_MODE=toss + 시크릿/클라이언트 키. 시크릿 키는 BE 밖으로 안 나간다
  # (승인은 BE 가 /v1/payments/confirm 으로). FE 엔 client-key(공개)만 내려간다.
  payment:
    mode: ${PAYMENT_MODE:stub}                    # stub | toss
    toss:
      secret-key: ${TOSS_SECRET_KEY:}             # 결제 승인 Basic 인증 (BE 전용, 노출 금지)
      client-key: ${TOSS_CLIENT_KEY:}             # 위젯 클라이언트 키 (FE 노출용 공개값)
  # 데모/심사 토글 (둘 다 기본 false, @Profile("!test")).
  demo:
    # 유지: 시드 강의(seeded) 강사에게 가용시간 전체 개방 → 시드 강의가 신청 가능해짐. coverage 는 한 번
    # 쓰면 DB 에 남아 멱등. 켜서 한 번 부팅하면 됨.
    seed-availability: ${DEMO_SEED_AVAILABILITY:false}
    # 🧪 DROP 대상: PG 심사 동안만 — 신청을 ~3초 뒤 자동 수락(강사 수동수락 대체). 심사 끝나면 이 토글 +
    # DemoAutoAcceptScheduler 제거.
    auto-accept: ${DEMO_AUTO_ACCEPT:false}
  # 공식(OFFICIAL) 위치 Sanity 캐시 reconcile. venue.md "캐싱·동기화·모니터링 설계".
  venue:
    reconcile:
      initial-delay-ms: ${VENUE_RECONCILE_INITIAL_DELAY_MS:30000}  # 부팅 후 첫 reconcile 까지 (기본 30초 — 캐시를 빨리 실 Sanity 와 동기화)
      interval-ms: ${VENUE_RECONCILE_INTERVAL_MS:600000}        # _rev 대조 주기 (기본 10분)
      stale-threshold-ms: ${VENUE_RECONCILE_STALE_MS:1800000}   # 이보다 오래 미실행이면 health DOWN (기본 30분 = 3주기)
    # Sanity GROQ 웹훅 — 어드민 publish 시 즉시 캐시 무효화(지연 최적화). 시크릿 없으면 검증 거부.
    webhook:
      secret: ${SANITY_WEBHOOK_SECRET:}

# Actuator — reconcile 잡 liveness heartbeat 노출(/actuator/health). 실 알림(페이징) 연동은 Phase 4 ops.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never