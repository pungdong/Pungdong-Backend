server:
  port: 8080

spring:
  application:
    name: msa-legacy-service
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        jdbc.lob.non_contextual_creation: true
        hbm2ddl.auto: validate   # Flyway 가 스키마 소유 — Hibernate 는 검증만(엔티티와 안 맞으면 부팅 실패로 drift 즉시 노출). 옛 update 졸업(#111)
        format_sql: true
        # instant(OffsetDateTime) 를 UTC 로 저장/조회. datasource URL 의 connectionTimeZone=UTC 와 한 쌍.
        # 절대시각은 UTC 통일(글로벌화) — 실 MySQL 검증: OffsetDateTime→datetime 컬럼에 UTC-wall 저장, API 는 ...Z. docs/architecture/time-handling.md.
        jdbc.time_zone: UTC
    # prod-safe 기본값 = off (매 쿼리/디스패처 폴링 SQL 로그 노이즈·CloudWatch 비용 회피).
    # 로컬 디버깅 시 env SPRING_JPA_SHOW_SQL=true 로 켜기.
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  # DB 스키마 마이그레이션 (Flyway). db/migration/V1,V2… 를 순서대로 1회씩 실행 → 모든 환경 동일 스키마.
  # baseline-on-migrate: 기존(비어있지 않은) DB 는 V1 을 "이미 적용됨"으로 표시만 하고 안 돌림(V2 부터 실행).
  # 테스트(H2)는 application-test.yml 에서 끔(create-drop 으로 엔티티에서 스키마 생성).
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  messages:
    basename: i18n/exception
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  jwt.secret: ${JWT_SECRET}

logging:
  level:
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
    com:
      amazonaws:
        util:
          EC2MetadataUtils: error



cloud.aws.s3.bucket: pungdong
# 공개-의도 이미지(코스/프로필/리뷰) 전용 공개 버킷(CloudFront OAC origin). 비면 메인 버킷으로 폴백
# — 공개 버킷 인프라가 붙기 전까지 업로드가 깨지지 않게. prod/staging 은 env 로 주입.
cloud.aws.s3.public-bucket: ${CLOUD_AWS_S3_PUBLIC_BUCKET:}
cloud.aws.region.static: ap-northeast-2
cloud.aws.stack.auto: false

spring.servlet.multipart.max-file-size: 50MB
spring.servlet.multipart.max-request-size: 50MB

mail:
  smtp:
    auth: true
    port: 465
    starttls:
      required: true
      enable: true
    socketFactory:
      class: javax.net.ssl.SSLSocketFactory
      fallback: false
      port: 465

AdminMail:
  id: ${ADMIN_MAIL_ID}
  password: ${ADMIN_MAIL_PASSWORD}

# CORS 허용 origin — 콤마 구분. 로컬 dev 기본값 (Vite/Next dev 서버). prod 는 env 로 override.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# 외부 연동 경계 (강사 신청). dev 기본값 = stub/local. prod 는 filesystem config / env 로 override:
#   pungdong.storage.s3.enabled=true            (S3 실연동 — Phase 4 버킷 provision 후)
#   pungdong.identity-verification.mode=disabled (실 본인확인기관 연동 전까지 fail-closed)
pungdong:
  # 외부 식별자 난독화 salt(Hashids). 순차 id → 비순차 코드(주문번호 등). 가역이라 salt 가 곧 키 — 노출/변경 금지
  # (바꾸면 기존 코드 decode 불가). 로컬/테스트는 기본값, 운영은 env 로 고정.
  hashids:
    salt: ${HASHIDS_SALT:pungdong-local-dev-salt}
  # 토큰 회전 멱등 창(초). /sign/refresh 가 같은 옛 RT 로 오는 동시/재유입 요청에 "같은 새 쌍"을 돌려주는 시간.
  # 웹(Next.js)처럼 여러 인스턴스/탭이 만료 access 로 동시에 refresh 를 쏠 때 이중소비로 세션이 죽는 걸 막는다.
  # 동시 발사 스프레드(보통 sub-초~수 초)만 덮으면 되므로 짧게. 스테이징 실측 후 무재배포 튜닝용 env.
  auth:
    refresh-idempotency-window-seconds: ${REFRESH_IDEMPOTENCY_WINDOW_SECONDS:60}
  storage:
    s3:
      enabled: ${STORAGE_S3_ENABLED:false}
    local:
      dir: ${STORAGE_LOCAL_DIR:local-uploads}
      base-url: ${STORAGE_LOCAL_BASE_URL:http://localhost:8080}
    # 공개 이미지 표시 base URL — 보통 CDN 도메인(예 https://cdn.plop.cool). 비면 S3 객체 URL 폴백.
    # 커스텀 도메인을 day-1 고정하므로 저장값을 완성된 공개 URL 로 둔다(코스/프로필/리뷰 FE 계약 무변경).
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  # 본인확인(휴대폰 SMS, 포트원 REST v2 / 다날). 로컬은 stub 기본(문자 미발송, 매직 OTP "000000"=성공).
  # staging/prod 실연동: IDENTITY_VERIFICATION_MODE=real + 아래 portone.* 시크릿 (다날 CPID 개통 후).
  identity-verification:
    mode: ${IDENTITY_VERIFICATION_MODE:stub}   # stub | disabled | real
    # CI/DI(고유식별정보) 암호화 키 (AES-256, 어떤 문자열이든 SHA-256 유도). prod 필수 — 미설정 시 dev 폴백.
    crypto-key: ${IDENTITY_CRYPTO_KEY:}
    # SMS 발송 간 최소 간격(초, 계정당). 다날 실 SMS 비용·남용 방어. 0=비활성. 초과 시 200 + retryAfterSeconds.
    send-cooldown-seconds: ${IDENTITY_SEND_COOLDOWN_SECONDS:30}
  # 포트원 본인확인 채널 (다날 CPID 가 채널키에 매핑). 전부 BE 전용 시크릿 — 밖으로 안 나간다.
  portone:
    api-secret: ${PORTONE_API_SECRET:}    # 포트원 V2 REST 시크릿 (Authorization: PortOne {secret})
    store-id: ${PORTONE_STORE_ID:}        # 상점 ID
    channel-key: ${PORTONE_CHANNEL_KEY:}  # 본인확인 채널키 (다날 CPID 매핑)
  # 어드민 지정 allowlist (콤마구분). 부팅 시 해당 이메일 계정에 ROLE_ADMIN 부여(idempotent).
  # 권한은 DB role 이 출처 — 이 목록은 "누구를 admin 으로"만 정함. 가입 후 재기동 시 반영.
  admin:
    emails: ${ADMIN_EMAILS:}
  # 약관 콘텐츠 소스 (Sanity). 동의 기록 시 BE 가 (key,version) 으로 전문을 직접 받아 박제한다.
  # public dataset 읽기라 대부분 토큰 불필요(projectId 는 공개값). 단 legalDocument 는 익명 거부라
  # legal 프록시(GET /legal/{slug})만 read 토큰으로 읽는다(legal/LegalDocumentClient 주석 참고).
  sanity:
    project-id: ${SANITY_PROJECT_ID:rc448mwo}
    dataset: ${SANITY_DATASET:production}
    api-version: ${SANITY_API_VERSION:2024-01-01}
    token: ${SANITY_TOKEN:}                       # Viewer read-only. 없으면 legal 프록시 빈 응답(로컬 기본)
    legal-ttl-ms: ${SANITY_LEGAL_TTL_MS:300000}   # legal 프록시 slug 캐시 TTL (기본 5분)
  # 주소 검색 + 좌표 변환 (juso). 좌표제공 API 는 개발용 승인키가 없어 로컬은 stub 기본.
  # staging/prod 만 juso 실호출: ADDRESS_GEOCODE_MODE=juso + 키 2개(검색/좌표) + 등록 URL referer.
  address:
    geocode-mode: ${ADDRESS_GEOCODE_MODE:stub}   # stub | juso
    juso:
      search-key: ${JUSO_SEARCH_KEY:}             # 도로명주소 검색 승인키
      coord-key: ${JUSO_COORD_KEY:}               # 좌표제공 승인키 (검색 키와 별개)
      referer: ${JUSO_REFERER:}                   # 운영 키 등록 URL (서버 호출 referer)
      # source-crs: 좌표제공 entX/entY 의 좌표계(기본 EPSG:5179). 실응답 검증 후 필요 시 override.
  # 결제(토스페이먼츠 결제위젯 v2). 로컬은 stub 기본(토스 미호출, 즉시 DONE).
  # staging/prod 만 실연동: PAYMENT_MODE=toss + 시크릿/클라이언트 키. 시크릿 키는 BE 밖으로 안 나간다
  # (승인은 BE 가 /v1/payments/confirm 으로). FE 엔 client-key(공개)만 내려간다.
  payment:
    mode: ${PAYMENT_MODE:stub}                    # stub | toss
    toss:
      secret-key: ${TOSS_SECRET_KEY:}             # 결제 승인 Basic 인증 (BE 전용, 노출 금지)
      client-key: ${TOSS_CLIENT_KEY:}             # 위젯 클라이언트 키 (FE 노출용 공개값)
  # 데모/심사 토글 (둘 다 기본 false, @Profile("!test")).
  demo:
    # 유지: 시드 강의(seeded) 강사에게 가용시간 전체 개방 → 시드 강의가 신청 가능해짐. coverage 는 한 번
    # 쓰면 DB 에 남아 멱등. 켜서 한 번 부팅하면 됨.
    seed-availability: ${DEMO_SEED_AVAILABILITY:false}
    # 🧪 DROP 대상: PG 심사 동안만 — 신청을 ~3초 뒤 자동 수락(강사 수동수락 대체). 심사 끝나면 이 토글 +
    # DemoAutoAcceptScheduler 제거.
    auto-accept: ${DEMO_AUTO_ACCEPT:false}
  # 공식(OFFICIAL) 위치 Sanity 캐시 reconcile. venue.md "캐싱·동기화·모니터링 설계".
  venue:
    reconcile:
      initial-delay-ms: ${VENUE_RECONCILE_INITIAL_DELAY_MS:30000}  # 부팅 후 첫 reconcile 까지 (기본 30초 — 캐시를 빨리 실 Sanity 와 동기화)
      interval-ms: ${VENUE_RECONCILE_INTERVAL_MS:600000}        # _rev 대조 주기 (기본 10분)
      stale-threshold-ms: ${VENUE_RECONCILE_STALE_MS:1800000}   # 이보다 오래 미실행이면 health DOWN (기본 30분 = 3주기)
    # Sanity GROQ 웹훅 — 어드민 publish 시 즉시 캐시 무효화(지연 최적화). 시크릿 없으면 검증 거부.
    webhook:
      secret: ${SANITY_WEBHOOK_SECRET:}

# Actuator — reconcile 잡 liveness heartbeat 노출(/actuator/health). 실 알림(페이징) 연동은 Phase 4 ops.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never